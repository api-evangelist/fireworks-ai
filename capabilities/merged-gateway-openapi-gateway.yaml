    namespace: merged-gateway-openapi-gateway-mcp
    port: 9090
    transport: http
    description: MCP adapter for Gateway REST API — gateway.openapi_Gateway. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-accounts
      description: List Accounts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: merged-gateway-openapi-gateway.gatewaylistaccounts
      with:
        pageSize: tools.pageSize
        pageToken: tools.pageToken
        filter: tools.filter
        orderBy: tools.orderBy
        readMask: tools.readMask
      outputParameters:
      - type: object
        mapping: $.
    - name: get-account
      description: Get Account
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: merged-gateway-openapi-gateway.gatewaygetaccount
      with:
        readMask: tools.readMask
        account_id: tools.account_id
      outputParameters:
      - type: object
        mapping: $.
    - name: distinct-filter-values-account-time
      description: Distinct filter values for an account/time range (serverless + dedicated; for FE, separate -yet mirrors
        GetAccountUsage).
      hints:
        readOnly: true
        destructive: false
        idempotent: true
