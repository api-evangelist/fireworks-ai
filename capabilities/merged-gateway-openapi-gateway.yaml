        call: merged-gateway-openapi-gateway.gatewaylistaccounts
        with:
          pageSize: rest.pageSize
          pageToken: rest.pageToken
          filter: rest.filter
          orderBy: rest.orderBy
          readMask: rest.readMask
        outputParameters:
        - type: object
          mapping: $.
