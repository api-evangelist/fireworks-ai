      - method: GET
        name: gatewaygetaccount
        description: Get Account
        call: merged-gateway-openapi-gateway.gatewaygetaccount
        with:
          readMask: rest.readMask
          account_id: rest.account_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/accounts/{account-id}/accountusagefilteroptions
      name: v1-accounts-account-id-accountusagefilteroptions
