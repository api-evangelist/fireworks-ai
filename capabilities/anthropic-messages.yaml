naftiko: 1.0.0-alpha2
info:
  label: Fireworks AI Anthropic Compatible Messages API
  description: 'Fireworks AI Anthropic Compatible Messages API. 1 operations. Lead operation: Create a Message. Self-contained
    Naftiko capability covering one Fireworks Ai business surface.'
  tags:
  - Fireworks Ai
  - Fireworks AI Anthropic Compatible Messages API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FIREWORKS_AI_API_KEY: FIREWORKS_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: anthropic-messages
    baseUri: https://api.fireworks.ai/inference
    description: Fireworks AI Anthropic Compatible Messages API business capability. Self-contained, no shared references.
    resources:
    - name: v1-messages
      path: /v1/messages
      operations:
      - name: messagespost
        method: POST
        description: Create a Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.FIREWORKS_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: anthropic-messages-rest
    port: 8080
    description: REST adapter for Fireworks AI Anthropic Compatible Messages API. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/messages
      name: v1-messages
      description: REST surface for v1-messages.
      operations:
      - method: POST
        name: messagespost
        description: Create a Message
        call: anthropic-messages.messagespost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: anthropic-messages-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fireworks AI Anthropic Compatible Messages API. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: create-message
      description: Create a Message
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: anthropic-messages.messagespost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
