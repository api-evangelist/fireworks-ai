          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gatewayUser'
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Account Id
          schema:
            type: string
        - name: user_id
          in: path
          required: true
          description: The User Id
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                  description: |-
                    Human-readable display name of the user. e.g. "Alice"
                    Must be fewer than 64 characters long.
                serviceAccount:
                  type: boolean
                  title: >-
                    Whether this user is a service account (can only be set by
                    admins)
                createTime:
                  type: string
                  format: date-time
                  description: The creation time of the user.
                  readOnly: true
                role:
                  type: string
                  description: >-
                    The user's role: admin, user, contributor, inference-user,
                    or custom.

                    When set to "custom", the user's permissions are governed by
