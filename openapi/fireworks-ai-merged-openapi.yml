        trainerJobId:
          type: string
          description: |-
            The trainer job that wrote this checkpoint.
            Format: accounts/{account}/rlorTrainerJobs/{rlor_trainer_job}
            Used to construct the GCS path (trainer-keyed bucket) and as a
            source annotation on the promoted model.
