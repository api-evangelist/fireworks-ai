    get:
      summary: Get Training Shape
      operationId: Gateway_GetTrainingShape
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gatewayTrainingShape'
      parameters:
        - name: readMask
          description: >-
