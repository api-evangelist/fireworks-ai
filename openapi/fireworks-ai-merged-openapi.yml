                  description: The update time for the user.
                  readOnly: true
                permissionPreset:
                  type: string
                  description: >-
                    The permission preset for this user. Only valid when role is
                    "custom".
              title: |-
                The properties of the User being updated. `user.name` must
                be populated with the updated resource's name.
              required:
                - role
        description: |-
          The properties of the User being updated. `user.name` must
