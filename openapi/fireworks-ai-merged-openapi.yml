          description: >-
            Start of the time range for time series data. Defaults to 30 days
            before `end`.
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: end
          description: >-
            End of the time range for time series data. Defaults to the request
            time.
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: interval
          description: >-
            Step size for the time series: each point is the peak effective
            limit observed within that

            window. Defaults to 4 hours.
          in: query
          required: false
          schema:
            type: string
        - name: account_id
          in: path
          required: true
