                    For multi-region deployments, model must be empty.
                weightedRandom:
                  $ref: '#/components/schemas/gatewayWeightedRandomStrategy'
                evenLoad:
                  $ref: '#/components/schemas/gatewayEvenLoadStrategy'
                aliases:
                  type: array
                  items:
                    type: string
                  title: >-
