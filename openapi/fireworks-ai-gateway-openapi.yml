      summary: Update Model
      operationId: Gateway_UpdateModel
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gatewayModel'
      parameters:
        - name: account_id
          in: path
