          title: Price per million output tokens
        uncachedInputTokenPricePerMillion:
          $ref: '#/components/schemas/typeMoney'
          title: Price per million uncached input tokens
        cachedInputTokenPricePerMillion:
          $ref: '#/components/schemas/typeMoney'
